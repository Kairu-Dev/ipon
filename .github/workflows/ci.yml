# Unified CI pipeline — lint, test, build, and E2E in one workflow.
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Cancel any in-progress runs for the same branch/PR
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────
  # 1. Lint — fast feedback on code style issues
  # ──────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # Install all dependencies (including devDependencies for ESLint)
      - name: Install dependencies
        run: npm ci

      # Run ESLint to catch code style and quality issues
      - name: Lint
        run: npm run lint

  # ──────────────────────────────────────────────
  # 2. Unit Tests — quick Vitest checks
  # ──────────────────────────────────────────────
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # --run flag tells Vitest to exit after a single run (no watch mode)
      - name: Run unit tests
        run: npm run test -- --run

  # ──────────────────────────────────────────────
  # 3. Build — verify the production bundle compiles
  # ──────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    needs: [lint, unit-tests] # Only build if lint + tests pass
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # These env vars are required for Next.js to build successfully
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_CONVEX_URL: ${{ secrets.NEXT_PUBLIC_CONVEX_URL }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}

  # ──────────────────────────────────────────────
  # 4. E2E Tests — Playwright browser tests
  # ──────────────────────────────────────────────
  e2e-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [lint, unit-tests] # Run in parallel with build after lint + unit pass
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # Only install Chromium (the only browser configured in playwright.config.ts)
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # Playwright starts the dev server via webServer config in playwright.config.ts
      - name: Run E2E tests
        run: npm run test:e2e
        env:
          NEXT_PUBLIC_CONVEX_URL: ${{ secrets.NEXT_PUBLIC_CONVEX_URL }}

      # Upload Playwright HTML report so you can debug failures from the Actions tab
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14